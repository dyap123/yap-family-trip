<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#FFF8EE;
  --bg-card:#FFFFFF;
  --bg-soft:#F6EEDF;
  --ink:#1F1A14;
  --ink-soft:#5C5247;
  --ink-mute:#8E8576;
  --accent:#D8403B;     /* SG flag red, slightly warmer */
  --accent-soft:#FCE4E2;
  --gold:#C8852A;
  --green:#3D8E5A;
  --blue:#2E6FA7;
  --line:rgba(31,26,20,0.08);
  --shadow:0 1px 2px rgba(31,26,20,0.04), 0 8px 28px rgba(31,26,20,0.06);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --tab-h:78px;
  --hdr-h:60px;
  --ease:cubic-bezier(0.22,0.9,0.32,1);
}
body.dark{
  --bg:#15120D;
  --bg-card:#22201B;
  --bg-soft:#1B1812;
  --ink:#F5EDDF;
  --ink-soft:#BFB3A1;
  --ink-mute:#8A8273;
  --accent:#FF6B5B;
  --accent-soft:rgba(255,107,91,0.16);
  --gold:#E0A65A;
  --green:#6FB987;
  --blue:#7AA8D6;
  --line:rgba(255,237,223,0.08);
  --shadow:0 1px 2px rgba(0,0,0,0.4), 0 8px 28px rgba(0,0,0,0.45);
}

html,body{
  height:100%;width:100%;overflow:hidden;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-size:17px;line-height:1.5;
  touch-action:pan-y;
}
body{
  display:flex;flex-direction:column;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);
}

/* paper texture */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle at 30% 20%,rgba(216,64,59,0.04),transparent 50%),
                    radial-gradient(circle at 80% 80%,rgba(200,133,42,0.05),transparent 50%);
}

/* ── Header ── */
.header{
  height:var(--hdr-h);min-height:var(--hdr-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;background:var(--bg);
  border-bottom:1px solid var(--line);
  position:relative;z-index:10;
}
.brand{
  display:flex;align-items:center;gap:10px;
  font-family:'Fraunces',serif;
  font-size:20px;font-weight:700;letter-spacing:-0.3px;
}
.brand-flag{
  width:26px;height:18px;border-radius:3px;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 1px 2px rgba(0,0,0,0.1);
}
.brand-flag-r{background:#D8403B;flex:1}
.brand-flag-w{background:#fff;flex:1}
.theme-btn{
  width:40px;height:40px;border-radius:50%;
  border:1px solid var(--line);background:var(--bg-card);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.15s var(--ease);
}
.theme-btn:active{transform:scale(0.92)}

/* ── Main ── */
.main{flex:1;overflow:hidden;position:relative;z-index:1}
.tab{
  position:absolute;inset:0;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  opacity:0;pointer-events:none;
  transition:opacity 0.2s ease;
}
.tab.active{opacity:1;pointer-events:auto}
.tab::-webkit-scrollbar{display:none}

.container{padding:14px 18px 24px;max-width:680px;margin:0 auto}

/* ── Hero (Today tab) ── */
.hero{
  background:linear-gradient(140deg,#D8403B 0%,#A8302D 60%,#7A2520 100%);
  color:#fff;border-radius:22px;
  padding:24px 22px 22px;
  margin-bottom:16px;position:relative;overflow:hidden;
  box-shadow:0 10px 32px rgba(216,64,59,0.32);
}
body.dark .hero{
  background:linear-gradient(140deg,#FF6B5B 0%,#C8423A 60%,#7E2723 100%);
  box-shadow:0 10px 32px rgba(255,107,91,0.25);
}
.hero::after{
  content:'';position:absolute;top:-40%;right:-20%;
  width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,0.15),transparent 70%);
}
.hero-eyebrow{
  font-size:13px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;opacity:0.85;
  margin-bottom:6px;position:relative;z-index:1;
}
.hero h1{
  font-family:'Fraunces',serif;
  font-size:38px;font-weight:900;line-height:1.05;
  letter-spacing:-1px;margin-bottom:8px;
  position:relative;z-index:1;
}
.hero-sub{
  font-size:18px;font-weight:500;opacity:0.92;
  position:relative;z-index:1;line-height:1.4;
}
.hero-stat{
  display:inline-block;background:rgba(255,255,255,0.18);
  padding:8px 16px;border-radius:999px;
  margin-top:14px;font-weight:700;font-size:15px;
  position:relative;z-index:1;
  backdrop-filter:blur(8px);
}

/* ── Section ── */
.section{margin-top:22px}
.section-title{
  font-family:'Fraunces',serif;
  font-size:24px;font-weight:700;letter-spacing:-0.3px;
  margin-bottom:12px;color:var(--ink);
}
.section-sub{
  font-size:14px;color:var(--ink-mute);
  margin-top:-8px;margin-bottom:14px;
}

/* ── Card ── */
.card{
  background:var(--bg-card);border-radius:18px;
  padding:18px 20px;margin-bottom:12px;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
  transition:transform 0.2s var(--ease);
  position:relative;
}
.card:active{transform:scale(0.985)}
.card.alert{
  border:2px solid var(--accent);
  background:var(--accent-soft);
}
.card.warm{
  background:linear-gradient(135deg,#FCE4E2,#FFF8EE);
  border-color:rgba(216,64,59,0.2);
}
body.dark .card.warm{
  background:linear-gradient(135deg,rgba(255,107,91,0.12),rgba(34,32,27,0.9));
}

/* ── Day card ── */
.day-card{
  background:var(--bg-card);border-radius:18px;
  margin-bottom:14px;overflow:hidden;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
  transition:transform 0.2s var(--ease);
}
.day-card:active{transform:scale(0.99)}
.day-card.today-card{
  border:2px solid var(--accent);
  box-shadow:0 0 0 6px var(--accent-soft),var(--shadow);
}
.day-card.past{opacity:0.55}
.day-strip{
  height:6px;width:100%;
  background:linear-gradient(90deg,var(--accent),var(--gold));
}
.day-strip.chill{background:linear-gradient(90deg,#3D8E5A,#7DC097)}
.day-strip.road{background:linear-gradient(90deg,#E76F51,#F4A261)}
.day-strip.party{background:linear-gradient(90deg,#D8403B,#FF6B6B)}
.day-strip.shop{background:linear-gradient(90deg,#7B2CBF,#C77DFF)}
.day-strip.food{background:linear-gradient(90deg,#E07A5F,#F2CC8F)}
.day-strip.fun{background:linear-gradient(90deg,#F72585,#B5179E)}
.day-strip.beach{background:linear-gradient(90deg,#0077B6,#48CAE4)}
.day-strip.wine{background:linear-gradient(90deg,#722F37,#C97C5D)}
.day-strip.home{background:linear-gradient(90deg,#457B9D,#A8DADC)}
.day-strip.farewell{background:linear-gradient(90deg,#D8403B,#5C5247)}

.day-head{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:18px 20px 6px;
}
.day-num-wrap{flex:1}
.day-num{
  font-size:13px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--ink-mute);
}
.day-num .live-dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--accent);margin-right:6px;
  animation:pulse 1.6s ease-in-out infinite;
  vertical-align:middle;margin-top:-2px;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(216,64,59,0.5)}
  50%{box-shadow:0 0 0 8px rgba(216,64,59,0)}
}
.day-date{
  font-family:'Fraunces',serif;
  font-size:30px;font-weight:800;letter-spacing:-0.5px;
  margin-top:2px;line-height:1.05;
}
.day-dow{
  font-size:15px;color:var(--ink-soft);font-weight:500;
  margin-top:2px;
}
.day-emoji{font-size:36px;line-height:1}

.day-body{padding:6px 20px 18px}

/* row of info: icon + label/value */
.info-row{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 0;border-top:1px solid var(--line);
}
.info-row:first-of-type{border-top:none;padding-top:6px}
.info-icon{
  width:36px;height:36px;flex-shrink:0;
  background:var(--bg-soft);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.info-text{flex:1;min-width:0}
.info-label{
  font-size:12px;font-weight:600;
  color:var(--ink-mute);letter-spacing:0.4px;
  text-transform:uppercase;
}
.info-value{
  font-size:16px;font-weight:600;color:var(--ink);
  line-height:1.35;margin-top:1px;
  word-break:break-word;
}
.info-value.big{font-size:18px;font-weight:700}
.info-extra{
  font-size:14px;color:var(--ink-soft);line-height:1.45;
  margin-top:3px;
}

/* group split chip */
.split-chip{
  display:inline-block;font-size:12px;font-weight:700;
  padding:4px 10px;border-radius:999px;
  margin-top:8px;letter-spacing:0.3px;
}
.split-chip.split{background:var(--accent-soft);color:var(--accent)}
.split-chip.together{background:rgba(61,142,90,0.15);color:var(--green)}

/* ── Hotel card (info tab) ── */
.hotel-card{
  background:var(--bg-card);border-radius:18px;
  padding:18px 20px;margin-bottom:12px;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
}
.hotel-dates{
  font-size:13px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--accent);
  margin-bottom:4px;
}
.hotel-name{
  font-family:'Fraunces',serif;
  font-size:22px;font-weight:800;line-height:1.15;
  letter-spacing:-0.3px;color:var(--ink);
  margin-bottom:6px;
}
.hotel-meta{
  font-size:14px;color:var(--ink-soft);
  line-height:1.5;
}
.hotel-actions{
  display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;
}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:10px 16px;border-radius:999px;
  font-size:14px;font-weight:600;
  text-decoration:none;cursor:pointer;
  border:1px solid var(--line);
  background:var(--bg-soft);color:var(--ink);
  transition:transform 0.15s var(--ease),background 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(0.95)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.outline{background:transparent}

/* ── Food card ── */
.food-card{
  background:var(--bg-card);border-radius:16px;
  padding:16px 18px;margin-bottom:10px;
  box-shadow:var(--shadow);border:1px solid var(--line);
}
.food-name{
  font-family:'Fraunces',serif;
  font-size:18px;font-weight:700;letter-spacing:-0.2px;
  color:var(--ink);margin-bottom:4px;
}
.food-meta{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  font-size:13px;color:var(--ink-mute);font-weight:500;
  margin-bottom:6px;
}
.food-pill{
  background:var(--bg-soft);padding:3px 10px;border-radius:999px;
  font-size:12px;font-weight:600;color:var(--ink-soft);
}
.food-pill.city{background:var(--accent-soft);color:var(--accent)}
.food-summary{
  font-size:14px;color:var(--ink-soft);
  line-height:1.5;
}
.food-sg{
  font-size:13px;color:var(--ink-mute);
  font-style:italic;margin-top:6px;
}

/* city group header on food tab */
.city-section{margin-top:24px}
.city-section:first-of-type{margin-top:0}
.city-head{
  font-family:'Fraunces',serif;
  font-size:22px;font-weight:800;
  color:var(--ink);margin-bottom:10px;
  display:flex;align-items:baseline;gap:10px;
}
.city-head .count{
  font-family:'Inter',sans-serif;
  font-size:13px;font-weight:600;
  color:var(--ink-mute);letter-spacing:0.5px;
}

/* ── Update card ── */
.update-card{
  background:var(--bg-card);border-radius:14px;
  padding:14px 18px;margin-bottom:10px;
  border:1px solid var(--line);
  border-left:5px solid var(--ink-mute);
  box-shadow:var(--shadow);
}
.update-card.important{border-left-color:var(--gold)}
.update-card.urgent{
  border-left-color:var(--accent);
  background:var(--accent-soft);
}
.update-meta{
  font-size:12px;color:var(--ink-mute);
  font-weight:600;letter-spacing:0.5px;
  margin-bottom:4px;
}
.update-from{color:var(--ink);font-weight:700}
.update-msg{
  font-size:15px;color:var(--ink);
  line-height:1.5;
}
.update-tag{
  display:inline-block;font-size:11px;font-weight:800;
  letter-spacing:1px;text-transform:uppercase;
  padding:2px 8px;border-radius:6px;
  margin-left:6px;vertical-align:middle;
}
.update-tag.urgent{background:var(--accent);color:#fff}
.update-tag.important{background:var(--gold);color:#fff}

/* ── People ── */
.people-group{
  background:var(--bg-card);border-radius:18px;
  padding:18px 20px;margin-bottom:12px;
  box-shadow:var(--shadow);border:1px solid var(--line);
}
.people-group h3{
  font-family:'Fraunces',serif;
  font-size:20px;font-weight:700;
  margin-bottom:4px;display:flex;align-items:center;gap:8px;
}
.people-group .group-sub{
  font-size:13px;color:var(--ink-mute);
  margin-bottom:12px;
}
.people-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  background:var(--bg-soft);
  padding:8px 14px;border-radius:999px;
  font-size:14px;font-weight:600;color:var(--ink);
  border:1px solid var(--line);
}

/* ── Loading ── */
.loading{
  text-align:center;padding:48px 20px;color:var(--ink-mute);
}
.spin{
  width:32px;height:32px;margin:0 auto 12px;
  border:3px solid var(--line);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Bottom nav ── */
.nav{
  height:var(--tab-h);min-height:var(--tab-h);
  display:flex;align-items:stretch;
  background:var(--bg-card);
  border-top:1px solid var(--line);
  padding-bottom:max(env(safe-area-inset-bottom,0px),0px);
  position:relative;z-index:10;
  box-shadow:0 -1px 0 var(--line);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  background:none;border:none;color:var(--ink-mute);
  font-size:11px;font-weight:600;letter-spacing:0.3px;
  cursor:pointer;padding:6px 0;
  transition:color 0.15s;
}
.nav-btn .nav-emoji{
  font-size:24px;line-height:1;filter:grayscale(0.4) opacity(0.7);
  transition:filter 0.15s,transform 0.2s var(--ease);
}
.nav-btn.active{color:var(--accent)}
.nav-btn.active .nav-emoji{filter:none;transform:translateY(-1px) scale(1.05)}
.nav-btn span{text-transform:uppercase;font-size:10.5px}

/* ── Empty ── */
.empty{
  text-align:center;padding:50px 24px;
  color:var(--ink-mute);font-size:15px;
}

/* ── Anchored callouts ── */
.callout{
  background:var(--accent-soft);
  border-radius:14px;padding:14px 16px;
  margin-bottom:14px;
  display:flex;gap:12px;align-items:flex-start;
  border:1px solid rgba(216,64,59,0.18);
}
.callout-icon{font-size:24px;line-height:1;margin-top:2px}
.callout-body{flex:1}
.callout-title{
  font-weight:700;color:var(--accent);font-size:15px;
  margin-bottom:2px;
}
.callout-text{font-size:14px;color:var(--ink);line-height:1.45}

/* fade in */
.fade{animation:fadeIn 0.3s var(--ease)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* big tablet style */
@media(min-width:768px){
  .container{padding:20px 28px 32px}
  html,body{font-size:18px}
  .hero h1{font-size:46px}
}
</style>
</head>
<body>

<header class="header">
  <div class="brand">
    <span class="brand-flag">
      <span class="brand-flag-r"></span>
      <span class="brand-flag-w"></span>

<main class="main">

</main>

<nav class="nav">

  <button class="nav-btn" data-tab="tabFood"><span class="nav-emoji">🍽️</span><span>Food</span></button>
  <button class="nav-btn" data-tab="tabPeople"><span class="nav-emoji">👨‍👩‍👧</span><span>Family</span></button>
</nav>

const FALLBACK = [

// ── Sheet fetcher (gviz) ──
function sheetUrl(name){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
}

function parseGviz(text){
  const m = text.match(/google\.visualization\.Query\.setResponse\((.+)\);?\s*$/s);
  if(!m) return null;
  try{
    const data = JSON.parse(m[1]);
    if(!data.table || !data.table.rows) return null;
    const rawRows = data.table.rows.map(r =>
      (r.c||[]).map(cell => cell ? (cell.v!==null && cell.v!==undefined ? String(cell.v) : (cell.f||'')) : '')
    );
    let headerIdx = 0;
    for(let i=0;i<Math.min(rawRows.length,5);i++){
      const row = rawRows[i];
      const shorts = row.filter(c => c && c.length>0 && c.length<30 && !/^\d+$/.test(c)).length;
      if(shorts>=3){ headerIdx=i; break; }
    }
    const headers = rawRows[headerIdx].map((h,i) => h || `col_${i}`);
    return rawRows.slice(headerIdx+1)
      .filter(row => row.some(c => c && c.trim()))
      .map(row => {
        const o = {};
        headers.forEach((h,i)=>{ o[h]=row[i]||''; });
        return o;
      });
  }catch(e){ console.warn('parseGviz',e); return null; }
}

async function fetchTab(name){
  try{
    const r = await fetch(sheetUrl(name));
    return parseGviz(await r.text());
  }catch(e){ return null; }
}

async function loadAll(){
  // try cache first
  try{
    const cached = localStorage.getItem(CACHE_KEY);
    if(cached){
      const {data,ts} = JSON.parse(cached);
      if(Date.now()-ts < CACHE_TTL){
        applyData(data);
        renderAll();
        // background refresh
        fetchAll().then(d => { if(d){ applyData(d); cache(d); renderAll(); }});
        return;
      }
    }
  }catch(e){}
  const data = await fetchAll();
  if(data){ applyData(data); cache(data); }
  state.loaded = true;
  renderAll();
}

async function fetchAll(){
  const [sched,food1,food2,upd] = await Promise.allSettled([
    fetchTab('Schedule Overview'),
    fetchTab('FOOD'),
    fetchTab('Food Recs (First Timer)'),
    fetchTab('Updates'),
  ]);
  const out = {};
  if(sched.status==='fulfilled' && sched.value) out.schedule = sched.value;
  if(food1.status==='fulfilled' && food1.value) out.food = food1.value;
  if(food2.status==='fulfilled' && food2.value) out.foodRecs = food2.value;
  if(upd.status==='fulfilled' && upd.value) out.updates = upd.value;
  return Object.keys(out).length ? out : null;
}

function cache(d){
  try{ localStorage.setItem(CACHE_KEY, JSON.stringify({data:d,ts:Date.now()})); }catch(e){}
}

function applyData(d){
  if(d.schedule && d.schedule.length){
    const merged = d.schedule.map((r,i) => {
      const dn = parseInt(r['Day']||r['day']||'') || (i+1);
      const fb = FALLBACK[i] || {};
      return {
        day:dn,
        date:r['Date']||fb.date||'',
        dow:r['Day of Week']||fb.dow||'',
        location:r['Location']||fb.location||'',
        accommodation:r['Accommodation']||fb.accommodation||'',
        events:r['Key Events']||r['Events']||fb.events||'',
        driveTime:r['Drive Time']||fb.driveTime||'',
        vibe:(r['Vibe']||fb.vibe||'chill').toLowerCase().split(/[\s\/]/)[0].replace(/[^a-z]/g,''),
        notes:r['Notes']||fb.notes||'',
        groupStatus:r['Group Status']||'',
        split:(r['Group Status']||'').toLowerCase().includes('split') || (r['Accommodation']||'').includes('/') || (r['Key Events']||'').includes('Group 1'),
      };
    }).filter(s => s.location || s.events);
    if(merged.length) state.schedule = merged;
  }
  if(d.food || d.foodRecs){
    state.food = parseFoodRows(d.food||[], d.foodRecs||[]);
  }
  if(d.updates){
    state.updates = d.updates.map(r => ({
      date:r['Date']||'',
      time:r['Time']||'',
      from:r['From']||'',
      message:r['Message']||'',
      priority:(r['Priority']||'normal').toLowerCase(),
    })).filter(u => u.message);
  }
}

function parseFoodRows(food, recs){
  const out = [];
  const seen = new Set();
  const push = (entry) => {
    if(!entry.name) return;
    const key = entry.name.toLowerCase();
    if(seen.has(key)) return;
    seen.add(key);
    out.push(entry);
  };
  food.forEach(f => {
    push({
      name: f['Restaurant']||f['Name']||f['Spot']||'',
      cuisine: f['Cuisine']||f['Type']||'',
      city: f['City']||f['Area']||f['Location']||f['Address / Area']||'',
      price: f['Price']||f['Price/Pax']||f['Cost']||'',
      summary: f['Notes']||f['Description']||f["Why It's Special"]||'',
      bestFor: f['Best For']||'',
      sg: f['SG Comparison']||f['SG Price']||'',
    });
  });
  let currentCity = '';
  recs.forEach(r => {
    const spot = (r['Spot']||r['Restaurant']||r['Name']||'').trim();
    if(!spot) return;
    // detect city header rows
    if(/^[A-Z][A-Z\s\/—\-]+$/.test(spot) && spot.length<40){
      const s = spot.toUpperCase();
      if(s.includes('SAN JOSE')) currentCity='San Jose';
      else if(s.includes('LOS ANGELES') || s.includes(' LA ')||s==='LA') currentCity='Los Angeles';
      else if(s.includes('DISNEY')) currentCity='Disneyland';
      else if(s.includes('VEGAS')) currentCity='Las Vegas';
      else if(s.includes('MALIBU')) currentCity='Malibu';
      else if(s.includes('ORANGE')||s.includes(' OC')) currentCity='Orange County';
      else if(s.includes('PASO')) currentCity='Paso Robles';
      else currentCity = spot.split(' ').map(w=>w[0]+w.slice(1).toLowerCase()).join(' ');
      return;
    }
    push({
      name: spot,
      cuisine: r['Cuisine']||r['Type']||'',
      city: currentCity || r['Address / Area']||r['Area']||'',
      price: r['Price/Pax']||r['Price']||'',
      summary: r["Why It's Special"]||r['Description']||r['Notes']||'',
      bestFor: r['Best For']||'',
      sg: r['SG Comparison']||'',
    });
  });
  return out;
}

function tripDayNumber(){
  const now = new Date();
  if(now < TRIP_START) return -1;
  if(now > TRIP_END) return 99;
  return Math.floor((now - TRIP_START) / 86400000) + 1;
}
function daysUntilTrip(){
  return Math.max(0, Math.ceil((TRIP_START - new Date())/86400000));
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function nl2br(s){ return esc(s).replace(/\n/g,'<br>'); }

            <div class="info-label">Vehicles</div>
            <div class="info-value">Van (12 seats) + 2 Teslas (10 seats) + Truck (5 seats)</div>
          </div>
        </div>
      </div>

      <div class="section" style="margin-top:18px">
        <div class="section-title">Latest news</div>
        ${renderUpdatesList(false)}
      </div>
    </div>
  `;
}

// ── Render: Updates list (used in multiple places) ──
function renderUpdatesList(limitTo3){
  const list = (state.updates||[]).slice().reverse();
  const shown = limitTo3 ? list.slice(0,3) : list;
  if(!shown.length){
    return '<div class="empty">No updates yet — check back later.</div>';
  }
  return shown.map(u => {
    const cls = (u.priority||'').includes('urgent') ? 'urgent'
              : (u.priority||'').includes('important') ? 'important' : '';
    const tag = (u.priority||'').includes('urgent') ? '<span class="update-tag urgent">Urgent</span>'
              : (u.priority||'').includes('important') ? '<span class="update-tag important">Important</span>' : '';
    return `<div class="update-card ${cls}">
      <div class="update-meta"><span class="update-from">${esc(u.from||'Trip team')}</span> · ${esc(u.date)} ${esc(u.time)}${tag}</div>
      <div class="update-msg">${esc(u.message)}</div>
    </div>`;
  }).join('');
}

function renderAll(){
  renderToday();
  renderTrip();
  renderHotels();
  renderFood();
  renderPeople();
}

// ── Tab nav ──
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    document.querySelector('.tab.active').scrollTop = 0;
  });
});

// ── Theme toggle ──
const themeBtn = document.getElementById('themeBtn');
function applyTheme(t){
  document.body.classList.toggle('dark', t==='dark');
  themeBtn.textContent = t==='dark' ? '☀️' : '🌙';
}
applyTheme(localStorage.getItem('yap_theme') || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'));
themeBtn.addEventListener('click', () => {
  const t = document.body.classList.contains('dark') ? 'light' : 'dark';
  applyTheme(t);
  localStorage.setItem('yap_theme', t);
});

// ── Boot ──
loadAll();
</script>
